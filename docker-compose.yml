services:
  roon-ai-bridge:
    build:
      context: .
      args:
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
    container_name: roon-ai-bridge
    network_mode: host
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: ${PORT:-3000}
      PORTAL_PORT: ${PORTAL_PORT:-3001}
      ENABLE_PORTAL: ${ENABLE_PORTAL:-true}
      DATA_DIR: /app/data
    volumes:
      - ./data:/app/data
