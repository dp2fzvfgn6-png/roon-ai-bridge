name: Publish container image

on:
  push:
    branches:
      - main
      - beta
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: publish-image-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          package-manager-cache: false

      - name: Enable pinned pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.9.0 --activate

      - name: Install exact dependencies
        run: pnpm install --frozen-lockfile

      - name: Run complete tests
        run: pnpm run test

      - name: Build TypeScript
        run: pnpm run build

  publish:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Read package version
        id: package
        shell: bash
        run: node -e "console.log('version=' + require('./package.json').version)" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Sign in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Define image tags and labels
        id: metadata
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/dp2fzvfgn6-png/roon-ai-bridge
          tags: |
            type=raw,value=beta,enable=${{ github.ref == 'refs/heads/beta' }}
            type=raw,value=stable,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=tag
            type=sha,prefix=sha-
          labels: |
            org.opencontainers.image.version=${{ steps.package.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=PolyForm-Noncommercial-1.0.0

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.package.outputs.version }}
            GIT_COMMIT=${{ github.sha }}
            INSTALLED_CHANNEL=${{ github.ref == 'refs/heads/beta' && 'beta' || 'stable' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true
